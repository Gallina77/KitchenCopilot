name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mocked/pure-logic test suite
        run: pytest -m "not db and not llm" --cov=utils --cov=components

  db-integration:
    runs-on: ubuntu-latest
    needs: lint-and-fast-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check whether test DB secret is configured
        id: check_secret
        env:
          SUPABASE_TEST_DB_URL: ${{ secrets.SUPABASE_TEST_DB_URL }}
        run: echo "has_secret=${{ env.SUPABASE_TEST_DB_URL != '' }}" >> "$GITHUB_OUTPUT"

      - name: Write test-tier secrets.toml
        if: steps.check_secret.outputs.has_secret == 'true'
        run: |
          mkdir -p .streamlit
          cat > .streamlit/secrets.toml <<EOF
          [connections.kitchencopilot_db_test]
          url = "${{ secrets.SUPABASE_TEST_DB_URL }}"
          EOF

      - name: Run real-DB integration tests
        if: steps.check_secret.outputs.has_secret == 'true'
        env:
          APP_ENV: test
        run: pytest -m db
